name: ChatGPT OpenWrt

on:
  workflow_dispatch:

env:
  REPO: Super-Henry/openwrt
  BRANCH: development-version

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: Clone OpenWrt
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO }}
          ref: ${{ env.BRANCH }}

      - name: Add NSS Packages
        run: |
          git clone https://github.com/Super-Henry/NSS-PACKAGES.git package/nss

      - name: Clone plugins
        run: |
          git clone https://github.com/jerrykuku/luci-theme-argon.git package/luci-theme-argon
          git clone https://github.com/jerrykuku/luci-app-argon-config.git package/luci-app-argon-config
          git clone https://github.com/Super-Henry/OpenClash.git package/luci-app-openclash
          git clone https://github.com/Super-Henry/OpenOray.git package/OpenOray

      - name: Fix OpenSSL
        run: |
          find package/OpenOray -name Makefile | xargs sed -i 's/+libopenssl.*/+libopenssl1.1/g'
          find package/OpenOray -name Makefile | xargs sed -i '/openssl3/d'

      - name: Embed OpenClash Core
        run: |
          mkdir -p files/etc/openclash/core
          wget -O files/etc/openclash/core/mihomo \
          https://github.com/MetaCubeX/mihomo/releases/latest/download/mihomo-linux-arm64
          chmod +x files/etc/openclash/core/mihomo

      - name: Enable OpenClash
        run: |
          mkdir -p files/etc/uci-defaults
          echo "#!/bin/sh" > files/etc/uci-defaults/99-openclash
          echo "uci set openclash.config.enable='1'" >> files/etc/uci-defaults/99-openclash
          echo "uci commit openclash" >> files/etc/uci-defaults/99-openclash
          echo "/etc/init.d/openclash enable" >> files/etc/uci-defaults/99-openclash
          chmod +x files/etc/uci-defaults/99-openclash

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure
        run: |
          make defconfig

          echo "CONFIG_PACKAGE_kmod-qca-nss-drv=y" >> .config
          echo "CONFIG_PACKAGE_kmod-qca-nss-ecm=y" >> .config
          echo "CONFIG_PACKAGE_qca-nss-fw=y" >> .config

          echo "CONFIG_PACKAGE_kmod-shortcut-fe=y" >> .config
          echo "CONFIG_PACKAGE_kmod-fast-classifier=y" >> .config

          echo "CONFIG_PACKAGE_libopenssl1.1=y" >> .config
          echo "CONFIG_PACKAGE_openssl=y" >> .config

          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-theme-argon=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-argon-config=y" >> .config

          echo "CONFIG_PACKAGE_luci-app-openclash=y" >> .config

          echo "CONFIG_PACKAGE_pgyvpn=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-pgyvpn=y" >> .config
          echo "CONFIG_PACKAGE_phtunnel=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-phtunnel=y" >> .config

          echo "CONFIG_PACKAGE_kmod-tun=y" >> .config
          echo "CONFIG_PACKAGE_kmod-nf-tproxy=y" >> .config

          echo "CONFIG_PACKAGE_dnsmasq-full=y" >> .config
          echo "CONFIG_PACKAGE_dnsmasq=n" >> .config

          echo "CONFIG_PACKAGE_curl=y" >> .config
          echo "CONFIG_PACKAGE_ca-bundle=y" >> .config
          echo "CONFIG_PACKAGE_ipset=y" >> .config

          make defconfig

      - name: Expand disk
        run: |
          sudo mkdir -p /mnt/upper /mnt/work
          sudo mount -t overlay overlay \
          -o lowerdir=$(pwd),upperdir=/mnt/upper,workdir=/mnt/work $(pwd)

      - name: Clean OpenSSL
        run: |
          rm -rf build_dir/target-*/openssl*
          rm -rf build_dir/host/openssl*

      - name: Download
        run: make download -j$(nproc)

      - name: Build
        run: |
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-max-nss-ultimate-final
          path: bin/targets/
